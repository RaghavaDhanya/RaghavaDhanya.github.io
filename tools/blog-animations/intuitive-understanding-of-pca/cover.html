<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PCA — cover</title>
<style>
  :root {
    --bg: #fbfaf6;            /* paper, slightly warm */
    --dot: #3f4b57;           /* soft charcoal */
    --pc1: #6e9a82;           /* sage emerald */
    --pc2: #c79862;           /* clay amber */
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .stage {
    width: 1200px;
    height: 630px;
    position: relative;
    background: var(--bg);
  }
  svg {
    width: 100%;
    height: 100%;
    display: block;
    shape-rendering: geometricPrecision;
  }
  .point {
    fill: var(--dot);
    fill-opacity: 0.42;
  }
  .arrow-line {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .arrow-head {
    stroke: none;
  }
</style>
</head>
<body>

<div class="stage">
  <svg id="plot" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<script>
// ---------------------------------------------------------------------------
// Deterministic synthetic cloud: tilted Gaussian.
// ---------------------------------------------------------------------------
function mulberry32(seed) {
  return function () {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rand) {
  const u = 1 - rand();
  const v = rand();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

const rand = mulberry32(11);
const N = 220;
// Cov [[a, b],[b, c]]: large variance along principal direction, small perpendicular.
// Cholesky for sampling: L = [[sqrt(a), 0], [b/sqrt(a), sqrt(c - b^2/a)]]
const A = 3.6, B = 0.9, C = 0.55;
const L11 = Math.sqrt(A);
const L21 = B / L11;
const L22 = Math.sqrt(C - L21 * L21);

const points = [];
for (let i = 0; i < N; i++) {
  const z1 = gauss(rand);
  const z2 = gauss(rand);
  const x = L11 * z1;
  const y = L21 * z1 + L22 * z2;
  points.push([x, y]);
}

// Sample mean — anchors the arrows so they sit through the visual center.
const meanX = points.reduce((s, p) => s + p[0], 0) / N;
const meanY = points.reduce((s, p) => s + p[1], 0) / N;

// Eigen of symmetric 2x2 [[A, B],[B, C]]
const tr = A + C;
const det = A * C - B * B;
const disc = Math.sqrt(Math.max(0, (tr * tr) / 4 - det));
const lam1 = tr / 2 + disc;
const lam2 = tr / 2 - disc;
let v1x = lam1 - C;
let v1y = B;
const n1 = Math.hypot(v1x, v1y);
v1x /= n1; v1y /= n1;
const v2x = -v1y, v2y = v1x;

// ---------------------------------------------------------------------------
// Geometry — center the cloud, scale to fill width with breathing room.
// ---------------------------------------------------------------------------
const W = 1200, H = 630;
const cx = W / 2, cy = H / 2;
// Pick a unit-to-pixel scale so 4 sigma along PC1 spans ~80% of the width.
const targetSpanPx = W * 0.8;
const sigma1 = Math.sqrt(lam1);
const scale = targetSpanPx / (4 * sigma1);

function dataToPx(x, y) {
  return [cx + x * scale, cy - y * scale];
}

// ---------------------------------------------------------------------------
// SVG building
// ---------------------------------------------------------------------------
const svg = document.getElementById('plot');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Points
for (const [x, y] of points) {
  const [px, py] = dataToPx(x, y);
  svg.appendChild(el('circle', { cx: px, cy: py, r: 4.5, class: 'point' }));
}

// Bidirectional arrow through the sample mean: triangular heads on both ends,
// line piercing the centroid.
function drawHead(tipPxX, tipPxY, ux, uy, color, headSize) {
  const baseCx = tipPxX - ux * headSize;
  const baseCy = tipPxY - uy * headSize;
  const halfBase = headSize * 0.55;
  const perpX = -uy, perpY = ux;
  const p1 = [tipPxX, tipPxY];
  const p2 = [baseCx + perpX * halfBase, baseCy + perpY * halfBase];
  const p3 = [baseCx - perpX * halfBase, baseCy - perpY * halfBase];
  svg.appendChild(el('polygon', {
    points: `${p1[0]},${p1[1]} ${p2[0]},${p2[1]} ${p3[0]},${p3[1]}`,
    class: 'arrow-head',
    fill: color,
  }));
}

function drawAxisArrow(dirX, dirY, lengthUnits, color, lineWidth, headSize) {
  // Endpoints in data space, centered on the sample mean.
  const posTipX = meanX + dirX * lengthUnits;
  const posTipY = meanY + dirY * lengthUnits;
  const negTipX = meanX - dirX * lengthUnits;
  const negTipY = meanY - dirY * lengthUnits;
  const [posPxX, posPxY] = dataToPx(posTipX, posTipY);
  const [negPxX, negPxY] = dataToPx(negTipX, negTipY);

  // Unit vector in pixel space (note: y flips because dataToPx negates y).
  const dx = posPxX - negPxX;
  const dy = posPxY - negPxY;
  const len = Math.hypot(dx, dy);
  const ux = dx / len, uy = dy / len;

  // Shorten line on both ends so heads sit cleanly.
  const x1 = negPxX + ux * headSize * 0.85;
  const y1 = negPxY + uy * headSize * 0.85;
  const x2 = posPxX - ux * headSize * 0.85;
  const y2 = posPxY - uy * headSize * 0.85;

  svg.appendChild(el('line', {
    x1, y1, x2, y2,
    class: 'arrow-line',
    stroke: color,
    'stroke-width': lineWidth,
  }));

  drawHead(posPxX, posPxY, ux, uy, color, headSize);
  drawHead(negPxX, negPxY, -ux, -uy, color, headSize);
}

// PC1: longer, sage. PC2: shorter, clay. Lengths in standard-deviation units.
drawAxisArrow(v1x, v1y, 2.4 * Math.sqrt(lam1), '#6e9a82', 3.0, 18);
drawAxisArrow(v2x, v2y, 2.4 * Math.sqrt(lam2), '#c79862', 2.4, 12);
</script>
</body>
</html>
