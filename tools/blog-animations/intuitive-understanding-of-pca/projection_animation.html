<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PCA projection — 2D → 1D</title>
<style>
  :root {
    --primary: #1e1e1e;
    --secondary: #6c6c6c;
    --tertiary: #d6d6d6;
    --border: #eeeeee;
    --bg: #ffffff;
    --axis: #b0b0b0;
    --grid-minor: #ededed;
    --drop-line: #c8c8c8;
    --pc1: #5a8a5a;
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                 Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    color: var(--primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage { width: 720px; height: 540px; position: relative; }
  svg { width: 100%; height: 100%; display: block; }
  .axis-line { stroke: var(--axis); stroke-width: 1; fill: none; }
  .axis-label { fill: var(--secondary); font-size: 13px; }
  .pc1-line { stroke: var(--pc1); stroke-width: 2; fill: none; stroke-linecap: round; }
  .drop-line {
    stroke: var(--drop-line); stroke-width: 0.8; fill: none;
    stroke-dasharray: 2 3;
  }
  .point { fill: var(--primary); fill-opacity: 0.55; }
  .controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  .controls button {
    font: inherit; font-size: 12px; color: var(--secondary);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="stage">
  <svg id="plot" viewBox="0 0 720 540" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="controls">
  <button id="restart">Restart</button>
</div>

<script>
window.__palette = {
  bg: "#ffffff",
  fg: ["#1e1e1e", "#6c6c6c", "#b0b0b0", "#c8c8c8", "#d6d6d6", "#ededed", "#eeeeee", "#5a8a5a"],
};

// ---------------------------------------------------------------------------
// Same seeded height/weight data as every other animation, for continuity.
// ---------------------------------------------------------------------------
function mulberry32(seed) {
  return function () {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rand) {
  const u = 1 - rand();
  const v = rand();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const rand = mulberry32(7);
const N = 180;
const raw = [];
for (let i = 0; i < N; i++) {
  const h = 170 + 9 * gauss(rand);
  const w = 0.55 * (h - 170) + 67 + 3.2 * gauss(rand);
  raw.push([h, w]);
}
const meanH = raw.reduce((s, p) => s + p[0], 0) / N;
const meanW = raw.reduce((s, p) => s + p[1], 0) / N;
const centered = raw.map(p => [p[0] - meanH, p[1] - meanW]);

// Covariance → eigenvectors
let cxx = 0, cyy = 0, cxy = 0;
for (const [x, y] of centered) { cxx += x*x; cyy += y*y; cxy += x*y; }
cxx /= N; cyy /= N; cxy /= N;
const tr = cxx + cyy;
const det = cxx * cyy - cxy * cxy;
const disc = Math.sqrt(Math.max(0, (tr * tr) / 4 - det));
const lam1 = tr / 2 + disc;
let v1x, v1y;
if (Math.abs(cxy) > 1e-9) { v1x = lam1 - cyy; v1y = cxy; }
else { v1x = cxx >= cyy ? 1 : 0; v1y = cxx >= cyy ? 0 : 1; }
const n1 = Math.hypot(v1x, v1y); v1x /= n1; v1y /= n1;
// PC1 angle (in math convention, measured from +x axis CCW)
const pc1Angle = Math.atan2(v1y, v1x);

// For each point, the projection onto the PC1 line is (p · v1) * v1.
const projected = centered.map(([x, y]) => {
  const s = x * v1x + y * v1y;  // scalar coordinate along PC1
  return { s, coord: [s * v1x, s * v1y] };
});

// ---------------------------------------------------------------------------
// Plot geometry
// ---------------------------------------------------------------------------
const W = 720, H = 540;
const PAD_L = 80, PAD_R = 60, PAD_T = 60, PAD_B = 80;
const plotW = W - PAD_L - PAD_R;
const plotH = H - PAD_T - PAD_B;
const cx = PAD_L + plotW / 2;
const cy = PAD_T + plotH / 2;
const xExtent = 36;
const yExtent = 24;
const sx = plotW / (2 * xExtent);
const sy = plotH / (2 * yExtent);

function dataToPx(x, y) { return [cx + x * sx, cy - y * sy]; }

// ---------------------------------------------------------------------------
// SVG setup
// ---------------------------------------------------------------------------
const svg = document.getElementById('plot');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Global rotation group — rotates in the last phase so PC1 becomes horizontal
const rotGroup = el('g', { id: 'rotGroup', transform: `rotate(0 ${cx} ${cy})` });
svg.appendChild(rotGroup);

// Original x/y axes live outside rotGroup so they don't rotate with the scene
const axesGroup = el('g', { id: 'axes', opacity: 1 });
svg.appendChild(axesGroup);
axesGroup.appendChild(el('line', {
  x1: PAD_L, y1: cy, x2: PAD_L + plotW, y2: cy, class: 'axis-line'
}));
axesGroup.appendChild(el('line', {
  x1: cx, y1: PAD_T, x2: cx, y2: PAD_T + plotH, class: 'axis-line'
}));
const xLab = el('text', {
  x: PAD_L + plotW, y: cy + 18, 'text-anchor': 'end', class: 'axis-label'
});
xLab.textContent = 'height';
axesGroup.appendChild(xLab);
const yLab = el('text', {
  x: cx, y: PAD_T - 12, 'text-anchor': 'middle', class: 'axis-label'
});
yLab.textContent = 'weight';
axesGroup.appendChild(yLab);

// PC1 line — drawn inside rotGroup so it rotates with the points
const pc1Len = Math.min(plotW, plotH) * 0.5;
const pc1X1 = cx - v1x * pc1Len;
const pc1Y1 = cy + v1y * pc1Len;
const pc1X2 = cx + v1x * pc1Len;
const pc1Y2 = cy - v1y * pc1Len;
const pc1Line = el('line', {
  x1: pc1X1, y1: pc1Y1, x2: pc1X2, y2: pc1Y2, class: 'pc1-line', opacity: 0
});
rotGroup.appendChild(pc1Line);

// Drop lines (perpendicular from point to PC1) — inside rotGroup
const dropGroup = el('g');
rotGroup.appendChild(dropGroup);
const dropEls = [];
for (let i = 0; i < N; i++) {
  const l = el('line', { class: 'drop-line', opacity: 0 });
  dropGroup.appendChild(l);
  dropEls.push(l);
}

// Points — inside rotGroup
const pointsGroup = el('g');
rotGroup.appendChild(pointsGroup);
const pointEls = [];
for (let i = 0; i < N; i++) {
  const [px, py] = dataToPx(centered[i][0], centered[i][1]);
  const c = el('circle', { cx: px, cy: py, r: 3, class: 'point' });
  pointsGroup.appendChild(c);
  pointEls.push(c);
}

// ---------------------------------------------------------------------------
// Animation
// ---------------------------------------------------------------------------
const phases = [
  { name: 'hold_original',       dur: 1000 },
  { name: 'reveal_pc1',          dur: 1000 },
  { name: 'project',             dur: 2200 },
  { name: 'fade_drops_and_axes', dur: 1000 },
  { name: 'rotate_to_horizontal', dur: 1600 },
  { name: 'hold_final',          dur: 1600 },
];
const totalDur = phases.reduce((s, p) => s + p.dur, 0);
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function lerp(a, b, t) { return a + (b - a) * t; }

function applyFrame(t) {
  let acc = 0;
  let pc1Opacity = 0;
  let projectProg = 0;       // 0..1 how far points have slid onto PC1
  let dropOpacity = 0;       // visibility of perpendicular drop lines
  let axesOpacity = 1;
  let rotateAngle = 0;
  for (const p of phases) {
    if (t < acc + p.dur) {
      const local = (t - acc) / p.dur;
      if (p.name === 'hold_original') {
        // nothing yet — scatter with original axes
      } else if (p.name === 'reveal_pc1') {
        pc1Opacity = easeInOut(local);
      } else if (p.name === 'project') {
        pc1Opacity = 1;
        projectProg = easeInOut(local);
        // drop lines fade in as the projection starts and fade out as it lands
        dropOpacity = Math.sin(Math.PI * local);
      } else if (p.name === 'fade_drops_and_axes') {
        pc1Opacity = 1;
        projectProg = 1;
        dropOpacity = 0;
        axesOpacity = 1 - easeInOut(local);
      } else if (p.name === 'rotate_to_horizontal') {
        pc1Opacity = 1;
        projectProg = 1;
        axesOpacity = 0;
        rotateAngle = easeInOut(local) * (pc1Angle * 180 / Math.PI);
      } else if (p.name === 'hold_final') {
        pc1Opacity = 1;
        projectProg = 1;
        axesOpacity = 0;
        rotateAngle = pc1Angle * 180 / Math.PI;
      }
      break;
    }
    acc += p.dur;
  }

  // Apply
  pc1Line.setAttribute('opacity', pc1Opacity);
  axesGroup.setAttribute('opacity', axesOpacity);
  rotGroup.setAttribute('transform', `rotate(${rotateAngle} ${cx} ${cy})`);

  for (let i = 0; i < N; i++) {
    const start = centered[i];
    const end = projected[i].coord;
    const x = lerp(start[0], end[0], projectProg);
    const y = lerp(start[1], end[1], projectProg);
    const [px, py] = dataToPx(x, y);
    pointEls[i].setAttribute('cx', px);
    pointEls[i].setAttribute('cy', py);

    // Drop line: from current point position to its PC1 projection
    const [ex, ey] = dataToPx(end[0], end[1]);
    const dl = dropEls[i];
    dl.setAttribute('x1', px);
    dl.setAttribute('y1', py);
    dl.setAttribute('x2', ex);
    dl.setAttribute('y2', ey);
    dl.setAttribute('opacity', dropOpacity * 0.9);
  }
}

// Clock
let startTime = null;
window.__virtualTimeMs = null;
function renderAt(elapsed) {
  const t = ((elapsed % totalDur) + totalDur) % totalDur;
  applyFrame(t);
}
window.renderAt = renderAt;
function frame(now) {
  if (window.__virtualTimeMs !== null) {
    renderAt(window.__virtualTimeMs);
    requestAnimationFrame(frame);
    return;
  }
  if (startTime === null) startTime = now;
  applyFrame((now - startTime) % totalDur);
  requestAnimationFrame(frame);
}
document.getElementById('restart').addEventListener('click', () => { startTime = null; });
requestAnimationFrame(frame);
</script>
</body>
</html>
