<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eigenvectors: directions the transformation can't bend</title>
<style>
  :root {
    --primary: #1e1e1e;
    --secondary: #6c6c6c;
    --tertiary: #d6d6d6;
    --border: #eeeeee;
    --bg: #ffffff;
    --grid-minor: #ededed;
    --grid-axis: #bdbdbd;
    --neutral-dot: #9a9a9a;
    --eigen-dot: #5a8a5a;
  }
  html, body {
    margin: 0; padding: 0; background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                 Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    color: var(--primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage { width: 720px; height: 540px; position: relative; }
  svg { width: 100%; height: 100%; display: block; }
  .grid-minor { stroke: var(--grid-minor); stroke-width: 0.8; fill: none; }
  .grid-axis  { stroke: var(--grid-axis); stroke-width: 1; fill: none; }
  .ray-dot    { transition: none; }
  .caption-text {
    fill: var(--secondary);
    font-size: 12px;
    font-style: italic;
  }
  .controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
  }
  .controls button {
    font: inherit; font-size: 12px; color: var(--secondary);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="stage">
  <svg id="plot" viewBox="0 0 720 540" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div class="controls">
  <button id="restart">Restart</button>
</div>

<script>
window.__palette = {
  bg: "#ffffff",
  fg: ["#1e1e1e", "#6c6c6c", "#9a9a9a", "#b0b0b0", "#bdbdbd", "#d6d6d6", "#ededed", "#eeeeee", "#5a8a5a"],
};

// ---------------------------------------------------------------------------
// Reuse the same seeded height/weight data → same covariance → same eigen
// directions as the Section 3 animation, so the colored eigenvector rays here
// visually match the principal direction in that animation's inset.
// ---------------------------------------------------------------------------
function mulberry32(seed) {
  return function () {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rand) {
  const u = 1 - rand();
  const v = rand();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
const rand = mulberry32(7);
const Nd = 180;
const raw = [];
for (let i = 0; i < Nd; i++) {
  const h = 170 + 9 * gauss(rand);
  const w = 0.55 * (h - 170) + 67 + 3.2 * gauss(rand);
  raw.push([h, w]);
}
const meanH = raw.reduce((s, p) => s + p[0], 0) / Nd;
const meanW = raw.reduce((s, p) => s + p[1], 0) / Nd;
const centered = raw.map(p => [p[0] - meanH, p[1] - meanW]);

// Covariance → eigendecomposition
let cxx = 0, cyy = 0, cxy = 0;
for (const [x, y] of centered) { cxx += x*x; cyy += y*y; cxy += x*y; }
cxx /= Nd; cyy /= Nd; cxy /= Nd;
const tr = cxx + cyy;
const det = cxx * cyy - cxy * cxy;
const disc = Math.sqrt(Math.max(0, (tr * tr) / 4 - det));
const lam1Real = tr / 2 + disc;
let v1x, v1y;
if (Math.abs(cxy) > 1e-9) { v1x = lam1Real - cyy; v1y = cxy; }
else { v1x = cxx >= cyy ? 1 : 0; v1y = cxx >= cyy ? 0 : 1; }
const n1 = Math.hypot(v1x, v1y); v1x /= n1; v1y /= n1;
const v2x = -v1y, v2y = v1x;

// Same normalized transformation as Section 3 but with tuned eigenvalues so
// the PC1-direction dots stretch visibly without leaving the plot.
const LAM1_SCALED = 1.35;
const LAM2_SCALED = 0.38;
const M = [
  [LAM1_SCALED * v1x * v1x + LAM2_SCALED * v2x * v2x,
   LAM1_SCALED * v1x * v1y + LAM2_SCALED * v2x * v2y],
  [LAM1_SCALED * v1x * v1y + LAM2_SCALED * v2x * v2y,
   LAM1_SCALED * v1y * v1y + LAM2_SCALED * v2y * v2y],
];
function applyM([x, y]) {
  return [M[0][0]*x + M[0][1]*y, M[1][0]*x + M[1][1]*y];
}

// ---------------------------------------------------------------------------
// Figure out which rays in our fan are (approximately) eigenvector directions.
// We compare each ray direction against ±v1 and ±v2 and mark the closest ones.
// ---------------------------------------------------------------------------
const NUM_RAYS = 12;           // evenly spaced around the compass
const DOTS_PER_RAY = 5;        // dots along each ray
const DOT_MIN_R = 0.45;        // in data units, distance of the innermost dot
const DOT_STEP_R = 0.32;       // spacing between successive dots

function principalAngleDiff(theta, refAngle) {
  let d = ((theta - refAngle) % Math.PI + Math.PI) % Math.PI;
  if (d > Math.PI / 2) d = Math.PI - d;
  return d;
}

const v1Angle = Math.atan2(v1y, v1x);
const v2Angle = Math.atan2(v2y, v2x);

const rays = [];
for (let i = 0; i < NUM_RAYS; i++) {
  const theta = (i / NUM_RAYS) * 2 * Math.PI;
  const dx = Math.cos(theta);
  const dy = Math.sin(theta);
  // Check alignment with either eigenvector (within some tolerance). We
  // snap the nearest rays to the eigenvector directions exactly so the
  // colored rays in the animation truly stay on their original line.
  const d1 = principalAngleDiff(theta, v1Angle);
  const d2 = principalAngleDiff(theta, v2Angle);
  rays.push({ i, theta, dx, dy, d1, d2 });
}

// Find the one ray nearest each eigen direction and snap it.
function snapRayToAngle(ray, angle) {
  ray.theta = angle + (ray.theta > angle ? 0 : 0);  // (no-op placeholder — we just fully replace)
  ray.theta = angle;
  ray.dx = Math.cos(angle);
  ray.dy = Math.sin(angle);
}
let bestV1 = null, bestV1Dist = Infinity;
let bestV2 = null, bestV2Dist = Infinity;
for (const r of rays) {
  if (r.d1 < bestV1Dist) { bestV1Dist = r.d1; bestV1 = r; }
  if (r.d2 < bestV2Dist) { bestV2Dist = r.d2; bestV2 = r; }
}
// Pick both half-lines of each eigen direction. Use the nearest unclaimed
// ray for each of the four oriented directions (+v1, -v1, +v2, -v2), then
// snap that ray's angle to the eigenvector direction exactly.
const orientedAngles = [v1Angle, v1Angle + Math.PI, v2Angle, v2Angle + Math.PI];
const eigenRayIds = new Set();
for (const a of orientedAngles) {
  const aNorm = ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  let best = null, bestDist = Infinity;
  for (const r of rays) {
    if (eigenRayIds.has(r.i)) continue;
    // Signed angular difference folded into [-π, π], absolute value taken.
    const signed = ((r.theta - aNorm + 3 * Math.PI) % (2 * Math.PI)) - Math.PI;
    const d = Math.abs(signed);
    if (d < bestDist) { bestDist = d; best = r; }
  }
  if (best) {
    best.theta = aNorm;
    best.dx = Math.cos(aNorm);
    best.dy = Math.sin(aNorm);
    eigenRayIds.add(best.i);
  }
}

// Build dot positions for each ray (original + transformed)
for (const r of rays) {
  r.isEigen = eigenRayIds.has(r.i);
  r.dots = [];
  for (let k = 0; k < DOTS_PER_RAY; k++) {
    const rad = DOT_MIN_R + k * DOT_STEP_R;
    const orig = [r.dx * rad, r.dy * rad];
    const trans = applyM(orig);
    r.dots.push({ orig, trans });
  }
}

// ---------------------------------------------------------------------------
// Plot geometry
// ---------------------------------------------------------------------------
const W = 720, H = 540;
const PAD = 50;
const plotHalf = Math.min(W, H) / 2 - PAD;
const cx = W / 2;
const cy = H / 2;
const DATA_EXTENT = 2.5;       // data-unit radius we want to fit in plotHalf
const scale = plotHalf / DATA_EXTENT;

function dataToPx(x, y) { return [cx + x * scale, cy - y * scale]; }

// ---------------------------------------------------------------------------
// SVG construction
// ---------------------------------------------------------------------------
const svg = document.getElementById('plot');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// Faint background grid, static — just for spatial reference
const gridGroup = el('g');
svg.appendChild(gridGroup);
const gridSteps = [-2, -1, 0, 1, 2];
for (const x of gridSteps) {
  const [px1, py1] = dataToPx(x, -2.5);
  const [px2, py2] = dataToPx(x, 2.5);
  gridGroup.appendChild(el('line', {
    x1: px1, y1: py1, x2: px2, y2: py2,
    class: x === 0 ? 'grid-axis' : 'grid-minor'
  }));
}
for (const y of gridSteps) {
  const [px1, py1] = dataToPx(-2.5, y);
  const [px2, py2] = dataToPx(2.5, y);
  gridGroup.appendChild(el('line', {
    x1: px1, y1: py1, x2: px2, y2: py2,
    class: y === 0 ? 'grid-axis' : 'grid-minor'
  }));
}

// Caption at the bottom
const caption = el('text', {
  x: W / 2, y: H - 20, 'text-anchor': 'middle', class: 'caption-text'
});
caption.textContent = 'each ray is a direction; dots show how spacing changes under the covariance transformation';
svg.appendChild(caption);

// Per-ray group: a faint connecting line (so the "ray" structure is visible
// even at rest, not just a constellation of rings) + the dots on top.
const rayGroup = el('g');
svg.appendChild(rayGroup);
for (const r of rays) {
  r.lineEl = el('line', {
    stroke: '#b0b0b0', 'stroke-width': 0.9, 'stroke-opacity': 0.55, fill: 'none'
  });
  rayGroup.appendChild(r.lineEl);
  r.dotEls = r.dots.map(() => {
    const c = el('circle', { r: 3.0, fill: '#9a9a9a', 'fill-opacity': 0.95, class: 'ray-dot' });
    rayGroup.appendChild(c);
    return c;
  });
}

// ---------------------------------------------------------------------------
// Animation
// ---------------------------------------------------------------------------
const phases = [
  { name: 'hold_original',     dur: 1200 },
  { name: 'transform',         dur: 2600 },
  { name: 'hold_transformed',  dur: 2400 },
];
const totalDur = phases.reduce((s, p) => s + p.dur, 0);
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function lerp(a, b, t) { return a + (b - a) * t; }

function hexMix(a, b, t) {
  const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
  const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
  const out = pa.map((v, i) => Math.round(lerp(v, pb[i], t)));
  return '#' + out.map(v => v.toString(16).padStart(2, '0')).join('');
}

function applyFrame(t) {
  let acc = 0;
  let progress = 0;
  for (const p of phases) {
    if (t < acc + p.dur) {
      const local = (t - acc) / p.dur;
      if (p.name === 'hold_original')         progress = 0;
      else if (p.name === 'transform')        progress = easeInOut(local);
      else                                    progress = 1;
      break;
    }
    acc += p.dur;
  }

  // Eigenvectors are colored from the very first frame so the eye goes to them
  // immediately. Non-eigen rays stay muted neutral.
  const NEUTRAL = '#b0b0b0';
  const EIGEN   = '#5a8a5a';

  for (const r of rays) {
    const fill = r.isEigen ? EIGEN : NEUTRAL;
    const lineOpacity = r.isEigen ? 0.85 : 0.45;

    let firstX, firstY, lastX, lastY;
    for (let k = 0; k < DOTS_PER_RAY; k++) {
      const o = r.dots[k].orig;
      const tr = r.dots[k].trans;
      const x = lerp(o[0], tr[0], progress);
      const y = lerp(o[1], tr[1], progress);
      const [px, py] = dataToPx(x, y);
      const elDot = r.dotEls[k];
      elDot.setAttribute('cx', px);
      elDot.setAttribute('cy', py);
      elDot.setAttribute('fill', fill);
      if (k === 0) { firstX = px; firstY = py; }
      if (k === DOTS_PER_RAY - 1) { lastX = px; lastY = py; }
    }

    r.lineEl.setAttribute('x1', firstX);
    r.lineEl.setAttribute('y1', firstY);
    r.lineEl.setAttribute('x2', lastX);
    r.lineEl.setAttribute('y2', lastY);
    r.lineEl.setAttribute('stroke', fill);
    r.lineEl.setAttribute('stroke-opacity', lineOpacity);
  }
}

// Clock
let startTime = null;
window.__virtualTimeMs = null;
function renderAt(elapsed) {
  const t = ((elapsed % totalDur) + totalDur) % totalDur;
  applyFrame(t);
}
window.renderAt = renderAt;
function frame(now) {
  if (window.__virtualTimeMs !== null) {
    renderAt(window.__virtualTimeMs);
    requestAnimationFrame(frame);
    return;
  }
  if (startTime === null) startTime = now;
  applyFrame((now - startTime) % totalDur);
  requestAnimationFrame(frame);
}
document.getElementById('restart').addEventListener('click', () => { startTime = null; });
requestAnimationFrame(frame);
</script>
</body>
</html>
