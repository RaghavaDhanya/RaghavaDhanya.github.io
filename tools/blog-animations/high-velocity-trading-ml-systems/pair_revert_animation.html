<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pair revert</title>
<style>
  :root {
    --primary: #1e1e1e;
    --secondary: #6c6c6c;
    --tertiary: #d6d6d6;
    --border: #eeeeee;
    --bg: #ffffff;
    --series-a: #4cb6c0;
    --series-b: #e25849;
    --signal: #6c6c6c;
    --profit: #1f9c3f;
    --flat: #bcbcbc;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                 Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    color: var(--primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .stage { width: 720px; height: 540px; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; }
  .series { fill: none; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
  .series.a { stroke: var(--series-a); }
  .series.b { stroke: var(--series-b); }
  .vertex.a { fill: var(--series-a); }
  .vertex.b { fill: var(--series-b); }
  .legend-text { fill: var(--primary); font-size: 16px; }
  .legend-swatch-a { fill: var(--series-a); }
  .legend-swatch-b { fill: var(--series-b); }
  .signal-text { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; fill: var(--signal); }
  .signal-suffix { font-size: 13px; font-weight: 500; }
  .controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center;
  }
  .controls button {
    font: inherit; font-size: 12px; color: var(--secondary);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; cursor: pointer;
  }
  .phase { font-size: 11px; color: var(--tertiary); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="stage">
  <svg id="plot" viewBox="0 0 720 540" preserveAspectRatio="xMidYMid meet"></svg>
</div>
<div class="controls">
  <button id="restart">Restart</button>
  <span class="phase" id="phaseLabel"></span>
</div>
<script>
// Variant via URL hash: #1, #2, #3
const variant = (location.hash || '#1').slice(1) || '1';

// ---------------------------------------------------------------------------
// Geometry
// ---------------------------------------------------------------------------
const W = 720, H = 540;
const Y_A = 274, Y_B = 286;
const X_START = -40;
const X_KINK  = 380;
const A_PEAK   = [480, 140];
const B_TROUGH = [480, 420];

const REVERT_1_END = [680, 408];
const REVERT_2_END = [680, 142];
const REVERT_3_END = [680, 280];

let endA, endB, aIsProfit, bIsProfit;
if (variant === '1') {
  endA = REVERT_1_END; endB = REVERT_1_END;
  aIsProfit = true;  bIsProfit = false;
} else if (variant === '2') {
  endA = REVERT_2_END; endB = REVERT_2_END;
  aIsProfit = false; bIsProfit = true;
} else {
  endA = REVERT_3_END; endB = REVERT_3_END;
  aIsProfit = true;  bIsProfit = true;
}

// ---------------------------------------------------------------------------
// Wiggly tracking entry (shared with pair_diverge): both lines come in from
// off-screen left with correlated noise that fades to zero at the kink.
// ---------------------------------------------------------------------------
function mulberry32(seed) {
  return function () {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rand) {
  const u = 1 - rand();
  const v = rand();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function smoothstep(a, b, x) {
  const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
}
const rand = mulberry32(7);
const N_WIGGLE = 60;
const WIGGLE_AMP = 6;
const wiggleA = [];
const wiggleB = [];
for (let i = 0; i < N_WIGGLE; i++) {
  const x = X_START + (X_KINK - X_START) * (i / (N_WIGGLE - 1));
  const t = i / (N_WIGGLE - 1);
  const fade = 1 - smoothstep(0.85, 1.0, t);
  const wave = fade * WIGGLE_AMP * (
    Math.sin(t * Math.PI * 4.0) * 0.55 +
    Math.sin(t * Math.PI * 7.3 + 1.2) * 0.30 +
    Math.sin(t * Math.PI * 11.1 + 2.5) * 0.18
  );
  const noiseA = fade * 0.7 * gauss(rand);
  const noiseB = fade * 0.7 * gauss(rand);
  wiggleA.push([x, Y_A + wave + noiseA]);
  wiggleB.push([x, Y_B + wave + noiseB]);
}

// Full paths: wiggle prefix + peak/trough + meeting point
const pathA = [...wiggleA, A_PEAK,    endA];
const pathB = [...wiggleB, B_TROUGH,  endB];
const KINK_IDX = N_WIGGLE - 1;
const PEAK_IDX = N_WIGGLE;          // index of A_PEAK / B_TROUGH in path
// Path indices: 0..KINK_IDX = wiggle, KINK_IDX..PEAK_IDX = diverge,
// PEAK_IDX..PEAK_IDX+1 = revert.

function arcLength(points, fromIdx, toIdx) {
  let len = 0;
  for (let i = fromIdx + 1; i <= toIdx; i++) {
    len += Math.hypot(points[i][0] - points[i-1][0], points[i][1] - points[i-1][1]);
  }
  return len;
}
function fractions(points) {
  const lTrack = arcLength(points, 0, KINK_IDX);
  const lDiverge = arcLength(points, KINK_IDX, PEAK_IDX);
  const lRevert = arcLength(points, PEAK_IDX, points.length - 1);
  const total = lTrack + lDiverge + lRevert;
  return {
    track: lTrack / total,
    afterDiverge: (lTrack + lDiverge) / total,
  };
}
const fracA = fractions(pathA);
const fracB = fractions(pathB);

// Labels above peak / below trough
const A_LABEL = [510, 105];
const B_LABEL = [510, 470];

// ---------------------------------------------------------------------------
// SVG setup
// ---------------------------------------------------------------------------
const svg = document.getElementById('plot');
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

const legend = el('g');
svg.appendChild(legend);
const legendY = 50, legendCx = W / 2;
legend.appendChild(el('rect', {
  x: legendCx - 70, y: legendY - 12, width: 14, height: 14, class: 'legend-swatch-a', rx: 2,
}));
const legA = el('text', { x: legendCx - 50, y: legendY, class: 'legend-text' });
legA.textContent = 'A';
legend.appendChild(legA);
legend.appendChild(el('rect', {
  x: legendCx + 6, y: legendY - 12, width: 14, height: 14, class: 'legend-swatch-b', rx: 2,
}));
const legB = el('text', { x: legendCx + 26, y: legendY, class: 'legend-text' });
legB.textContent = 'B';
legend.appendChild(legB);

function pathD(points) {
  return points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(2) + ' ' + p[1].toFixed(2)).join(' ');
}
const pa = el('path', { d: pathD(pathA), class: 'series a', 'pathLength': 1 });
const pb = el('path', { d: pathD(pathB), class: 'series b', 'pathLength': 1 });
svg.appendChild(pa);
svg.appendChild(pb);

// End dots only — no left-side anchor
const aEndDot = el('circle', { cx: pathA.at(-1)[0], cy: pathA.at(-1)[1], r: 5, class: 'vertex a', opacity: 0 });
const bEndDot = el('circle', { cx: pathB.at(-1)[0], cy: pathB.at(-1)[1], r: 5, class: 'vertex b', opacity: 0 });
svg.appendChild(aEndDot);
svg.appendChild(bEndDot);

function makeSignal(pos, mainText) {
  const g = el('g', { opacity: 0 });
  const main = el('text', { x: pos[0], y: pos[1], class: 'signal-text' });
  main.textContent = mainText;
  const suffix = el('text', { x: pos[0], y: pos[1] + 20, class: 'signal-suffix' });
  suffix.textContent = '';
  g.appendChild(main); g.appendChild(suffix);
  return { g, main, suffix };
}
const aSig = makeSignal(A_LABEL, '▼ SHORT A');
const bSig = makeSignal(B_LABEL, '▲ LONG B');
svg.appendChild(aSig.g);
svg.appendChild(bSig.g);

// ---------------------------------------------------------------------------
// Animation
// ---------------------------------------------------------------------------
const phases = [
  { name: 'idle',     dur: 300  },
  { name: 'together', dur: 1500 },
  { name: 'diverge',  dur: 1500 },
  { name: 'signal',   dur: 700  },
  { name: 'revert',   dur: 1700 },
  { name: 'hold',     dur: 1700 },
];
const totalDur = phases.reduce((s, p) => s + p.dur, 0);
const phaseLabel = document.getElementById('phaseLabel');

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }

function setReveal(path, frac) {
  path.setAttribute('stroke-dasharray', '1 1');
  path.setAttribute('stroke-dashoffset', String(1 - frac));
}

function colorMix(c1, c2, t) {
  const a = parseInt(c1.slice(1), 16), b = parseInt(c2.slice(1), 16);
  const ar = (a >> 16) & 255, ag = (a >> 8) & 255, ab = a & 255;
  const br = (b >> 16) & 255, bg = (b >> 8) & 255, bb = b & 255;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `rgb(${r}, ${g}, ${bl})`;
}
const SIGNAL = '#6c6c6c';
const PROFIT = '#1f9c3f';
const FLAT   = '#bcbcbc';

function setSignalState(sig, isProfit, profitProgress) {
  const target = isProfit ? PROFIT : FLAT;
  const color = colorMix(SIGNAL, target, profitProgress);
  sig.main.style.fill = color;
  sig.suffix.style.fill = color;
  if (profitProgress > 0.05) {
    sig.suffix.textContent = isProfit ? '✓ profit' : '≈ flat';
  } else {
    sig.suffix.textContent = '';
  }
  sig.suffix.setAttribute('opacity', clamp01(profitProgress * 1.2));
}

function fracForPhase(frac, trackProg, divProg, revertProg) {
  // Reveal up to the wiggle-end first, then the diverge segment, then the revert.
  return frac.track * trackProg
       + (frac.afterDiverge - frac.track) * divProg
       + (1 - frac.afterDiverge) * revertProg;
}

function applyFrame(t) {
  let acc = 0;
  let cur = phases[0];
  let local = 0;
  for (const p of phases) {
    if (t < acc + p.dur) { cur = p; local = (t - acc) / p.dur; break; }
    acc += p.dur;
  }
  phaseLabel.textContent = cur.name;

  let trackProg = 0, divProg = 0, revertProg = 0;
  let signalOpacity = 0, profitProgress = 0;
  if (cur.name === 'idle') {}
  else if (cur.name === 'together') { trackProg = easeInOut(local); }
  else if (cur.name === 'diverge')  { trackProg = 1; divProg = easeInOut(local); }
  else if (cur.name === 'signal')   { trackProg = 1; divProg = 1; signalOpacity = easeInOut(local); }
  else if (cur.name === 'revert')   {
    trackProg = 1; divProg = 1; revertProg = easeInOut(local);
    signalOpacity = 1; profitProgress = easeInOut(local);
  }
  else { trackProg = 1; divProg = 1; revertProg = 1; signalOpacity = 1; profitProgress = 1; }

  setReveal(pa, fracForPhase(fracA, trackProg, divProg, revertProg));
  setReveal(pb, fracForPhase(fracB, trackProg, divProg, revertProg));
  aEndDot.setAttribute('opacity', revertProg >= 0.985 ? 1 : 0);
  bEndDot.setAttribute('opacity', revertProg >= 0.985 ? 1 : 0);
  aSig.g.setAttribute('opacity', signalOpacity);
  bSig.g.setAttribute('opacity', signalOpacity);
  setSignalState(aSig, aIsProfit, profitProgress);
  setSignalState(bSig, bIsProfit, profitProgress);
}

let startTime = null;
window.__virtualTimeMs = null;
function renderAt(elapsed) {
  const t = ((elapsed % totalDur) + totalDur) % totalDur;
  applyFrame(t);
}
window.renderAt = renderAt;
function frame(now) {
  if (window.__virtualTimeMs !== null) { renderAt(window.__virtualTimeMs); requestAnimationFrame(frame); return; }
  if (startTime === null) startTime = now;
  applyFrame((now - startTime) % totalDur);
  requestAnimationFrame(frame);
}
document.getElementById('restart').addEventListener('click', () => { startTime = null; });
requestAnimationFrame(frame);
</script>
</body>
</html>
